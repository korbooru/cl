{% extends 'base.html' %} {% block content %}
    <h1>My Subscriptions (A-Z)</h1>
    <ul>
        {% for sub in subs %}
            <li>
                <a href="{{ url_for('channel', username=sub.username) }}">
                    {{ sub.display_name }}
                </a>
            </li>
        {% else %}
            <p>You aren't subscribed to anyone yet!</p>
        {% endfor %}
    </ul>
{% endblock %}
