<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPlay</title>
    
    <style>
        :root {
            --bg-color: #f9f9f9;
            --nav-bg: #ffffff;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --border-color: #e5e5e5;
            --card-bg: #ffffff;
            --hover-bg: #f2f2f2;
            --accent: #065fd4;
        }
        body.dark-theme {
            --bg-color: #0f0f0f;
            --nav-bg: #0f0f0f;
            --text-main: #f1f1f1;
            --text-muted: #aaaaaa;
            --border-color: #272727;
            --card-bg: #151515;
            --hover-bg: #272727;
            --accent: #3ea6ff;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: Roboto, Arial, sans-serif; margin: 0; padding: 0; }
        a { color: var(--text-main); text-decoration: none; }
        
        /* Navbar */
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; background: var(--nav-bg); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .logo a { font-size: 22px; font-weight: bold; letter-spacing: -1px; }
        .search-bar { display: flex; flex: 1; max-width: 600px; margin: 0 40px; }
        .search-bar input { flex: 1; padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 20px 0 0 20px; background: var(--bg-color); color: var(--text-main); font-size: 16px; }
        .search-bar button { padding: 10px 24px; border: 1px solid var(--border-color); border-left: none; border-radius: 0 20px 20px 0; background: var(--hover-bg); color: var(--text-main); cursor: pointer; }
        
        /* Buttons & Inputs */
        button, .btn { padding: 8px 16px; border: none; border-radius: 18px; background: var(--hover-bg); color: var(--text-main); cursor: pointer; font-weight: 500; font-size: 14px; }
        button:hover, .btn:hover { background: var(--border-color); }
        .btn-primary { background: var(--text-main); color: var(--bg-color); }
        .btn-primary:hover { background: var(--text-muted); }
        
        /* Layouts */
        .page-container { max-width: 1600px; margin: 0 auto; padding: 24px; }
        .grid-layout { display: flex; gap: 24px; }
        .main-content { flex: 1; min-width: 0; }
        .right-sidebar { width: 350px; flex-shrink: 0; }
        
        /* Video Cards */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .video-card { display: flex; flex-direction: column; gap: 12px; }
        .video-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; background: #000; transition: border-radius 0.2s; }
        .video-card:hover .video-thumb { border-radius: 4px; }
        .video-title { font-size: 16px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0; }
        .video-meta { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
        
        /* Sidebars & Panels */
        .panel { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .pfp-mini { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--border-color); }
    </style>
</head>
<body {% if dark_mode %}class="dark-theme"{% endif %}>
    <header>
        <div class="logo"><a href="/">CloudPlay</a></div>
        <form class="search-bar" action="/search" method="GET">
            <input type="text" name="q" placeholder="Search..." required>
            <button type="submit">Search</button>
        </form>
        <div style="display: flex; gap: 12px; align-items: center;">
            {% if current_user.is_authenticated %}
                <a href="/upload" class="btn">Upload</a>
                <a href="/channel/{{ current_user.username }}" class="btn">My Channel</a>
                <a href="/settings" class="btn">Settings</a>
                <a href="/logout" class="btn">Logout</a>
            {% else %}
                <a href="/login" class="btn">Sign In</a>
                <a href="/register" class="btn btn-primary">Create Account</a>
            {% endif %}
        </div>
    </header>
    
    <div class="page-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
