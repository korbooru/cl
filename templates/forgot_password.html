{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: #FFFFFF; border: 1px solid #CCCCCC; padding: 20px;">
    <h2 style="margin-top: 0; font-size: 18px; border-bottom: 1px solid #EEE; padding-bottom: 8px;">Recover Account Password</h2>
    <p style="font-size: 12px; color: #555; line-height: 1.4;">Provide your profile's registered email identifier below. An 8-digit temporary code token authentication block will be sent to recover your account.</p>
    
    <form method="POST" action="/forgot-password">
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px;">Your Email Address</label>
            <input type="email" name="email" required style="width: 100%; padding: 6px; border: 1px solid #CCCCCC; font-size: 13px;">
        </div>
        <button type="submit" style="width: 100%; padding: 8px; font-weight: bold; background: #0033CC; color: white; border: 1px solid #0022AA; cursor: pointer;">Request Reset Code</button>
    </form>
    <div style="margin-top: 15px; font-size: 12px; text-align: center;">
        <a href="/login">Return to Sign In</a>
    </div>
</div>
{% endblock %}
