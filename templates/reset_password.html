{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: #FFFFFF; border: 1px solid #CCCCCC; padding: 20px;">
    <h2 style="margin-top: 0; font-size: 18px; border-bottom: 1px solid #EEE; padding-bottom: 8px;">Enter Authorization Token</h2>
    
    <form method="POST" action="/reset-password">
        <input type="hidden" name="email" value="{{ email }}">
        
        <div style="margin-bottom: 12px;">
            <label style="display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px;">Account Email Target</label>
            <input type="text" value="{{ email }}" disabled style="width: 100%; padding: 6px; background: #F0F0F0; border: 1px solid #CCC; color:#666; font-size: 13px;">
        </div>

        <div style="margin-bottom: 12px;">
            <label style="display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #CC0000;">8-Digit Reset Code</label>
            <input type="text" name="code" maxlength="8" placeholder="e.g., 12345678" required style="width: 100%; padding: 6px; border: 1px solid #CC0000; font-family: monospace; font-size: 15px; letter-spacing: 2px; text-align: center;">
        </div>

        <div style="margin-bottom: 18px;">
            <label style="display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px;">Choose New Password</label>
            <input type="password" name="new_password" required style="width: 100%; padding: 6px; border: 1px solid #CCCCCC; font-size: 13px;">
        </div>

        <button type="submit" style="width: 100%; padding: 8px; font-weight: bold; background: #008800; color: white; border: 1px solid #006600; cursor: pointer;">Override & Update Password</button>
    </form>
</div>
{% endblock %}
