{% extends 'base.html' %}

{% block content %}
<div class="panel" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-top:0; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">Settings</h2>
    
    <form method="POST" action="/settings" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 24px; margin-top: 20px;">
        
        <div>
            <h3 style="font-size: 16px; margin-bottom: 10px; color: var(--accent);">🎨 Appearance</h3>
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 15px;">
                <input type="checkbox" name="dark_mode" value="dark_mode" {% if u_settings.dark_mode %}checked{% endif %} style="width: 18px; height: 18px;"> 
                <strong>Enable Dark Theme</strong>
            </label>
        </div>

        <div>
            <h3 style="font-size: 16px; margin-bottom: 10px; color: var(--accent);">⭐ Identity</h3>
            
            <label style="display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px;">Display Name</label>
            <input type="text" name="display_name" value="{{ current_user.display_name }}" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color); color: var(--text-main); margin-bottom: 16px; box-sizing: border-box;">

            <label style="display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px;">Unique Handle (@username)</label>
            <input type="text" name="username" value="{{ current_user.username }}" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color); color: var(--text-main); margin-bottom: 6px; box-sizing: border-box;">
            
            <label style="display: block; font-size: 12px; color: #d32f2f; margin-bottom: 6px; font-weight: bold;">Confirm Password (Only if altering Handle)</label>
            <input type="password" name="current_password" placeholder="Enter password..." style="width: 100%; padding: 10px; border: 1px solid #d32f2f; border-radius: 6px; background: var(--bg-color); color: var(--text-main); box-sizing: border-box;">
        </div>

        <div>
            <h3 style="font-size: 16px; margin-bottom: 10px; color: var(--accent);">📝 Details</h3>
            
            <label style="display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px;">Channel Bio</label>
            <textarea name="bio" rows="4" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color); color: var(--text-main); margin-bottom: 16px; box-sizing: border-box;">{{ current_user.bio }}</textarea>

            <label style="display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px;">Avatar Image</label>
            <input type="file" name="pfp_file" accept="image/jpeg,image/png" style="color: var(--text-muted); font-size: 14px;">
        </div>

        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 10px;">
            <a href="/channel/{{ current_user.username }}" class="btn">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
